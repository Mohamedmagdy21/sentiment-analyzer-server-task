name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run linting
        run: ./scripts/lint.sh

  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest -v

  build-image:
    needs:
      - lint
      - unit-test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t mohamedmagdy812001/sentiment-analyzer-task-v3:latest .

      - name: Push Docker image
        run: |
          docker push mohamedmagdy812001/sentiment-analyzer-task-v3:latest

  deploy:
    needs:
      - build-image

    runs-on: ubuntu-latest

    env:
      TEAMSPACE: ${{ vars.TEAMSPACE }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      LIGHTNING_USERNAME: ${{ secrets.LIGHTNING_USERNAME }}
      GITHUB_SHA_SHORT: ${{ github.sha }}
      LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
      LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Deploy to Lightning AI
        run: uv run python deploy.py
